name: Data Quality & Linting

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff sqlfluff

      # --- STEP 1: Check Python/Notebooks ---
      - name: Run Ruff (Python Linting)
        run: python -m ruff check .

      # --- STEP 2: Check SQL (if applicable) ---
      - name: Run SQLFluff (SQL Linting)
        run: sqlfluff lint . --dialect databricks
